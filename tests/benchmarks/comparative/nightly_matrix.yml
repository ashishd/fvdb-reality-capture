# Nightly comparative benchmark matrix: 3 representative scenes at 50% training
# duration. Covers outdoor (garden, bicycle) and indoor (bonsai) with both
# default and MCMC optimizers for fVDB.
#
# NOTE: gsplat configs are excluded from nightly runs for now.
#
# gsplat has a cold-start bug on L4 GPUs: the very first gsplat training run on
# a fresh instance produces garbage renders (PSNR ~14, loss never converges).
# All subsequent runs in the same session work fine (PSNR ~27). The bug affects
# whichever strategy runs first (Default or MCMC). A 500-step warmup run in the
# nightly workflow mitigates this for any gsplat runs added here.
# See: diagnostic run 22336658156, warmup confirmation run 22339193186.
#
# gsplat MCMC also OOMs on L4 (22GB) at high gaussian counts. Use cap_max to
# constrain memory if adding gsplat_mcmc configs.
#
# The base opt_configs use max_epochs: 200 and refine_stop_epoch: 100 (50% of
# training). We halve both here so the refinement/training ratio stays the same.
name: nightly_benchmark

paths:
  gsplat_base: /workspace/gsplat/examples
  data_base: /workspace/data

datasets:
- name: garden
  path: 360_v2/garden
- name: bonsai
  path: 360_v2/bonsai
- name: bicycle
  path: 360_v2/bicycle

opt_configs:
  fvdb_default:
    path: opt_configs/fvdb_default.yml
  fvdb_mcmc:
    path: opt_configs/fvdb_mcmc_default.yml

runs:
  # --- garden (outdoor) ---
  - dataset: garden
    opt_config: fvdb_default
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
  - dataset: garden
    opt_config: fvdb_mcmc
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
        optimization_config:
          max_gaussians: 5500000

  # --- bonsai (indoor) ---
  - dataset: bonsai
    opt_config: fvdb_default
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
  - dataset: bonsai
    opt_config: fvdb_mcmc
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
        optimization_config:
          max_gaussians: 1200000

  # --- bicycle (outdoor, complex) ---
  - dataset: bicycle
    opt_config: fvdb_default
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
  - dataset: bicycle
    opt_config: fvdb_mcmc
    overrides:
      fvdb:
        reconstruction_config:
          max_epochs: 100
          refine_stop_epoch: 50
        optimization_config:
          max_gaussians: 5500000
