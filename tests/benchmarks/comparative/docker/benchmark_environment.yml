name: benchmark
channels:
  - conda-forge
  - nodefaults
dependencies:
  - blas=*=mkl
  - ca-certificates
  - certifi
  - cmake
  - cuda-command-line-tools
  - cuda-compiler
  - cuda-cudart-dev
  - cuda-nvrtc-dev
  - cuda-nvtx-dev
  - cuda-version=13.0
  - cxx-compiler
  - gcc_linux-64=13
  - git
  - gitpython
  - gxx_linux-64=13
  - imageio
  - ipython
  - libcublas-dev
  - libcurand-dev
  - libcusolver-dev
  - libcusparse-dev
  - libpng
  - linkify-it-py
  - make
  - matplotlib
  - msgpack-python
  - myst-parser
  - ninja
  - numpy
  - openssl
  - openusd
  - pandas
  - parameterized
  - pip
  - pkg-config
  - polyscope
  - psutil
  - pybind11
  - py-opencv>=4.10[build=headless*]
  - pytest-benchmark
  - python=3.12
  - pytorch-gpu=2.11.0
  - rich
  - scikit-build-core
  - scikit-learn
  - seaborn
  - setuptools>=68.2.2
  - sphinx_rtd_theme
  - sphinx>=7.0.0
  - tensorboard
  - torchvision
  - tqdm
  - zlib
  ## 3dgs
  - boto3
  - gdal
  - pillow
  - pyproj
  - pyyaml
  - scikit-image
  - viser
  - pip:
    - point-cloud-utils
    - pytest-markdown-docs
    - oiio-static-python
    - dlnr_lite
    - einops
    ## comparative benchmark extras
    - piexif
    - splines
    - nerfview @ git+https://github.com/nerfstudio-project/nerfview@4538024fe0d15fd1a0e4d760f3695fc44ca72787
    - pycolmap @ git+https://github.com/rmbrualla/pycolmap@cc7ea4b7301720ac29287dbe450952511b32125e
    - torchmetrics
    - sam2==1.1.0
